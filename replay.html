<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mood2Know — Replay Auto WOW</title>
  <meta name="robots" content="noindex,nofollow">

  <link rel="stylesheet" href="./maplibre-gl.css">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font: 16px system-ui;
      background: #000;
    }

    :root { --vh: 1vh; }

    #map {
      position: fixed;
      inset: 0;
      width: 100%;
      height: calc(var(--vh) * 100);
    }

    .sr-only{
      position:absolute;
      width:1px; height:1px;
      padding:0; margin:-1px;
      overflow:hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border:0;
    }
  </style>
</head>

<body>
  <h1 class="sr-only">Mood2Know – Replay automatique WOW</h1>
  <div id="map"></div>

  <script src="./maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    /* =========================================================================
       0) MOBILE VIEWPORT FIX
       ========================================================================= */
    function setVh() {
      document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
    }
    window.addEventListener('resize', setVh);
    setVh();

    /* =========================================================================
       1) MAP SETUP
       ========================================================================= */
    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: {
          osm: {
            type: "raster",
            tiles: [
              "https://a.tile.openstreetmap.org/{z}/{x}/{y}.png",
              "https://b.tile.openstreetmap.org/{z}/{x}/{y}.png",
              "https://c.tile.openstreetmap.org/{z}/{x}/{y}.png"
            ],
            tileSize: 256,
            attribution: "© OpenStreetMap contributors"
          }
        },
        layers: [{ id: "osm", type: "raster", source: "osm" }]
      },
      center: [0, 20],
      zoom: 2,
      pitch: 0
    });

    /* =========================================================================
       2) MOOD ICONS (0..10)
       ========================================================================= */
    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function lerpColor(c1, c2, t) {
      const r = Math.round(lerp(c1[0], c2[0], t));
      const g = Math.round(lerp(c1[1], c2[1], t));
      const b = Math.round(lerp(c1[2], c2[2], t));
      return `rgb(${r},${g},${b})`;
    }

    function moodImageData(level, size = 96) {
      const t = Math.max(0, Math.min(1, level / 10));
      const red = [215, 25, 28];
      const yellow = [255, 255, 191];
      const green = [26, 150, 65];

      const fill = (t < 0.5)
        ? lerpColor(red, yellow, t / 0.5)
        : lerpColor(yellow, green, (t - 0.5) / 0.5);

      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      const cx = size / 2;
      const cy = size / 2;
      const r = size * 0.42;

      ctx.beginPath();
      ctx.arc(cx, cy + 3, r, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.lineWidth = Math.max(3, size * 0.04);
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.stroke();

      const eyeY = cy - size * 0.10;
      const eyeDX = size * 0.14;
      const eyeR = size * 0.04;

      ctx.beginPath();
      ctx.arc(cx - eyeDX, eyeY, eyeR, 0, Math.PI * 2);
      ctx.arc(cx + eyeDX, eyeY, eyeR, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,0,0,0.75)";
      ctx.fill();

      const browY = eyeY - size * 0.08;
      const browTilt = lerp(0.20, -0.20, t);
      ctx.lineWidth = Math.max(3, size * 0.035);
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.lineCap = "round";

      ctx.beginPath();
      ctx.moveTo(cx - eyeDX - size * 0.06, browY + browTilt * size * 0.08);
      ctx.lineTo(cx - eyeDX + size * 0.06, browY - browTilt * size * 0.08);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(cx + eyeDX - size * 0.06, browY - browTilt * size * 0.08);
      ctx.lineTo(cx + eyeDX + size * 0.06, browY + browTilt * size * 0.08);
      ctx.stroke();

      const mouthY = cy + size * 0.12;
      const mouthW = size * 0.26;
      const curvature = lerp(-1, 1, t);

      ctx.beginPath();
      ctx.moveTo(cx - mouthW, mouthY);
      ctx.quadraticCurveTo(cx, mouthY + curvature * size * 0.12, cx + mouthW, mouthY);
      ctx.strokeStyle = "rgba(0,0,0,0.70)";
      ctx.lineWidth = Math.max(4, size * 0.05);
      ctx.lineCap = "round";
      ctx.stroke();

      const img = ctx.getImageData(0, 0, size, size);
      return { width: img.width, height: img.height, data: img.data };
    }

    function ensureMoodImages() {
      for (let lvl = 0; lvl <= 10; lvl++) {
        const name = `mood-${lvl}`;
        if (!map.hasImage(name)) {
          map.addImage(name, moodImageData(lvl, 96));
        }
      }
    }

    /* =========================================================================
       3) POINTS SOURCE + LAYERS
       ========================================================================= */
    function initPointsSourceAndLayers() {
      if (map.getSource("points")) return;

      map.addSource("points", {
        type: "geojson",
        data: { type: "FeatureCollection", features: [] },
        cluster: true,
        clusterRadius: 60,
        clusterMaxZoom: 14,
        clusterProperties: {
          sum: ["+", ["get", "value"]],
          count: ["+", 1]
        }
      });

      const avgRoundedClamped = [
        "case",
        ["<", ["round", ["/", ["get","sum"], ["get","count"]]], 0], 0,
        [">", ["round", ["/", ["get","sum"], ["get","count"]]], 10], 10,
        ["round", ["/", ["get","sum"], ["get","count"]]]
      ];

      map.addLayer({
        id: "clusters-mood",
        type: "symbol",
        source: "points",
        filter: ["has", "point_count"],
        layout: {
          "icon-image": ["concat", "mood-", ["to-string", avgRoundedClamped]],
          "icon-size": ["step", ["get","point_count"], 0.65, 10, 0.75, 50, 0.9, 200, 1.05, 1000, 1.2],
          "icon-allow-overlap": true,
          "text-field": ["to-string", ["get","point_count"]],
          "text-size": 12,
          "text-offset": [0, 1.55],
          "text-allow-overlap": true,
          "text-anchor": "top"
        },
        paint: {
          "text-color": "rgba(0,0,0,0.75)",
          "text-halo-color": "rgba(255,255,255,0.9)",
          "text-halo-width": 1
        }
      });

      map.addLayer({
        id: "points-mood",
        type: "symbol",
        source: "points",
        filter: ["!", ["has", "point_count"]],
        layout: {
          "icon-image": [
            "concat", "mood-",
            ["to-string",
              ["case",
                ["<", ["round", ["get","value"]], 0], 0,
                [">", ["round", ["get","value"]], 10], 10,
                ["round", ["get","value"]]
              ]
            ]
          ],
          "icon-size": 0.55,
          "icon-allow-overlap": true
        }
      });

      map.on("click", "clusters-mood", (e) => {
        const f = e.features[0];
        map.getSource("points").getClusterExpansionZoom(
          f.properties.cluster_id,
          (err, zoom) => {
            if (err) return;
            map.easeTo({ center: f.geometry.coordinates, zoom });
          }
        );
      });

      map.on("mouseenter", "clusters-mood", () => {
        map.getCanvas().style.cursor = "pointer";
      });

      map.on("mouseleave", "clusters-mood", () => {
        map.getCanvas().style.cursor = "";
      });
    }

    /* =========================================================================
       4) SUPABASE CONFIG
       ========================================================================= */
    const SUPABASE_URL = "https://ugrmxzdhevqrgftlxfnp.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVncm14emRoZXZxcmdmdGx4Zm5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyODQ3OTQsImV4cCI6MjA4NDg2MDc5NH0.WgTj-6ADFEMrCgPNxeQZvknBBJI1c9uDY9_8Qlkqu4w"; // remplace par ta vraie clé complète
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* =========================================================================
       5) REPLAY CONFIG
       ========================================================================= */
    const REPLAY_DURATION_SEC = 20;
    const MAX_POINTS = 20000;
    const START_FROM_UTC = "2026-02-01T00:00:00.000Z";

    let rows = [];
    let feats = [];
    let t0 = 0;
    let t1 = 0;
    let span = 1;

    let playing = false;
    let raf = null;
    let startedAt = 0;

    let lastFlyAt = 0;
    let lastFlyLngLat = null;
    let lastCameraCount = 0;

    /* =========================================================================
       6) HELPERS
       ========================================================================= */
    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function haversineKm(a, b) {
      const toRad = (x) => x * Math.PI / 180;
      const R = 6371;
      const dLat = toRad(b[1] - a[1]);
      const dLon = toRad(b[0] - a[0]);
      const lat1 = toRad(a[1]);
      const lat2 = toRad(b[1]);
      const s =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(s));
    }

    function toFeature(r) {
      return {
        type: "Feature",
        properties: {
          value: Number(r.mood),
          t: new Date(r.created_at).getTime()
        },
        geometry: {
          type: "Point",
          coordinates: [Number(r.lon), Number(r.lat)]
        }
      };
    }

    function setSourceCount(n) {
      const src = map.getSource("points");
      if (!src) return;
      src.setData({
        type: "FeatureCollection",
        features: feats.slice(0, n)
      });
    }

    /* =========================================================================
       7) WOW CAMERA
       ========================================================================= */
    function maybeFlyTo(count) {
      const now = performance.now();

      if (count < 2) return;
      if (count === lastCameraCount) return;

      const minInterval = 1400;
      if (now - lastFlyAt < minInterval) return;

      const r = rows[count - 1];
      if (!r) return;

      const target = [Number(r.lon), Number(r.lat)];

      if (lastFlyLngLat) {
        const d = haversineKm(lastFlyLngLat, target);
        if (d < 600) return;
      }

      lastFlyAt = now;
      lastFlyLngLat = target;
      lastCameraCount = count;

      const zoomBase = 4.15;
      const zoomJitter = ((count % 5) * 0.12);
      const pitch = 35 + ((count % 3) * 4);
      const bearing = ((count * 23) % 80) - 40;

      map.flyTo({
        center: target,
        zoom: zoomBase + zoomJitter,
        bearing,
        pitch,
        speed: 0.48,
        curve: 1.1,
        essential: true,
        easing: (t) => t * (2 - t)
      });
    }

    function resetCameraState() {
      lastFlyAt = 0;
      lastFlyLngLat = null;
      lastCameraCount = 0;

      map.jumpTo({
        center: [0, 20],
        zoom: 2,
        bearing: 0,
        pitch: 0
      });
    }

    /* =========================================================================
       8) RENDER
       ========================================================================= */
    function renderAtProgress(p) {
      p = clamp(p, 0, 1);
      const targetTime = t0 + p * span;

      let count = 0;
      while (
        count < rows.length &&
        new Date(rows[count].created_at).getTime() <= targetTime
      ) {
        count++;
      }

      setSourceCount(count);
      maybeFlyTo(count);
    }

    /* =========================================================================
       9) PLAYBACK
       ========================================================================= */
    function play() {
      if (!rows.length || playing) return;

      playing = true;
      startedAt = performance.now();

      function step(now) {
        if (!playing) return;

        const elapsed = (now - startedAt) / 1000;
        const loopProgress = (elapsed / REPLAY_DURATION_SEC) % 1;

        renderAtProgress(loopProgress);
        raf = requestAnimationFrame(step);
      }

      raf = requestAnimationFrame(step);
    }

    function pause() {
      playing = false;
      if (raf) cancelAnimationFrame(raf);
      raf = null;
    }

    /* =========================================================================
       10) LOAD DATA
       ========================================================================= */
    async function loadRows() {
      const { data, error } = await sb
        .from("mood_entries")
        .select("mood, lon, lat, created_at")
        .gte("created_at", START_FROM_UTC)
        .order("created_at", { ascending: true })
        .limit(MAX_POINTS);

      if (error) {
        console.error("DB load failed:", error);
        return [];
      }

      const cleaned = (data || []).filter(r =>
        typeof r.lon === "number" &&
        typeof r.lat === "number" &&
        r.created_at
      );

      return cleaned;
    }

    async function bootReplay() {
      rows = await loadRows();
      feats = rows.map(toFeature);

      if (!rows.length) {
        console.warn("No moods found from", START_FROM_UTC);
        return;
      }

      t0 = new Date(rows[0].created_at).getTime();
      t1 = new Date(rows[rows.length - 1].created_at).getTime();
      span = Math.max(1, t1 - t0);

      setSourceCount(0);
      resetCameraState();
      play();
    }

    /* =========================================================================
       11) TAB VISIBILITY
       ========================================================================= */
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        pause();
      } else {
        resetCameraState();
        play();
      }
    });

    /* =========================================================================
       12) INIT
       ========================================================================= */
    map.on("load", async () => {
      ensureMoodImages();
      initPointsSourceAndLayers();
      await bootReplay();
    });
  </script>
</body>
</html>
